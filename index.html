<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ABYSS PROTOCOL</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}body { overflow: hidden; background: #000; color: white; font-family: Arial, sans-serif; }

canvas { display: block; background: #050505; }

#ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }

#title { font-size: 28px; font-weight: bold; letter-spacing: 4px; }

#subtitle { opacity: 0.5; margin-top: 5px; }

#warning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; opacity: 0; transition: 0.5s; pointer-events: none; }

#coords { position: absolute; bottom: 20px; left: 20px; opacity: 0.4; }

#memory { position: absolute; bottom: 20px; right: 20px; opacity: 0.5; text-align: right; }

.flash { animation: flash 0.3s infinite; }

@keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } } </style>

</head>
<body><div id="ui">
    <div id="title">ABYSS PROTOCOL</div>
    <div id="subtitle">THE MAZE IS OBSERVING YOU</div>
</div><div id="warning">DO NOT TRUST THE WALLS</div><div id="coords">
    Sector: UNKNOWN
</div><div id="memory">
    Memory Integrity: 100%
</div><canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const tileSize = 40;
const cols = 50;
const rows = 50;

let maze = [];
let player = {
    x: 1,
    y: 1,
    size: 12,
    color: 'white'
};

let camera = {
    x: 0,
    y: 0
};

let memoryIntegrity = 100;
let hallucinationLevel = 0;
let mazeShiftTimer = 0;

function createMaze() {
    maze = [];

    for (let y = 0; y < rows; y++) {
        let row = [];

        for (let x = 0; x < cols; x++) {
            if (
                x === 0 ||
                y === 0 ||
                x === cols - 1 ||
                y === rows - 1
            ) {
                row.push(1);
            } else {
                row.push(Math.random() > 0.68 ? 1 : 0);
            }
        }

        maze.push(row);
    }

    maze[1][1] = 0;
    maze[rows - 2][cols - 2] = 0;

    carvePath(1, 1);
}

function carvePath(x, y) {
    const directions = [
        [0, -1],
        [1, 0],
        [0, 1],
        [-1, 0]
    ].sort(() => Math.random() - 0.5);

    for (const [dx, dy] of directions) {
        const nx = x + dx * 2;
        const ny = y + dy * 2;

        if (
            ny > 0 &&
            ny < rows - 1 &&
            nx > 0 &&
            nx < cols - 1 &&
            maze[ny][nx] === 1
        ) {
            maze[ny][nx] = 0;
            maze[y + dy][x + dx] = 0;
            carvePath(nx, ny);
        }
    }
}

createMaze();

function drawMaze() {
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {

            const screenX = x * tileSize - camera.x;
            const screenY = y * tileSize - camera.y;

            if (maze[y][x] === 1) {

                let brightness = 255;

                if (hallucinationLevel > 20 && Math.random() > 0.97) {
                    brightness = Math.random() * 255;
                }

                ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness})`;
                ctx.fillRect(screenX, screenY, tileSize, tileSize);
            }
        }
    }
}

function drawPlayer() {
    ctx.beginPath();
    ctx.arc(
        player.x * tileSize + tileSize / 2 - camera.x,
        player.y * tileSize + tileSize / 2 - camera.y,
        player.size,
        0,
        Math.PI * 2
    );

    ctx.fillStyle = player.color;
    ctx.fill();
}

function updateCamera() {
    camera.x = player.x * tileSize - canvas.width / 2;
    camera.y = player.y * tileSize - canvas.height / 2;
}

function movePlayer(dx, dy) {
    const nx = player.x + dx;
    const ny = player.y + dy;

    if (maze[ny] && maze[ny][nx] === 0) {
        player.x = nx;
        player.y = ny;

        memoryIntegrity -= 0.03;
        hallucinationLevel += 0.02;
    }
}

window.addEventListener('keydown', (e) => {
    switch(e.key.toLowerCase()) {
        case 'w':
        case 'arrowup':
            movePlayer(0, -1);
            break;

        case 's':
        case 'arrowdown':
            movePlayer(0, 1);
            break;

        case 'a':
        case 'arrowleft':
            movePlayer(-1, 0);
            break;

        case 'd':
        case 'arrowright':
            movePlayer(1, 0);
            break;
    }
});

function randomMazeShift() {

    for (let i = 0; i < 20; i++) {

        let x = Math.floor(Math.random() * cols);
        let y = Math.floor(Math.random() * rows);

        if (
            x !== player.x &&
            y !== player.y &&
            x > 1 &&
            y > 1 &&
            x < cols - 2 &&
            y < rows - 2
        ) {
            maze[y][x] = maze[y][x] === 1 ? 0 : 1;
        }
    }
}

function glitchText() {
    const warning = document.getElementById('warning');

    if (Math.random() > 0.996) {
        warning.style.opacity = 1;

        const messages = [
            'DO NOT TRUST THE WALLS',
            'YOU WERE HERE BEFORE',
            'THE EXIT MOVED',
            'TURN BACK',
            'IT IS LEARNING',
            'YOU ARE OBSERVED',
            'THIS IS NOT THE FIRST LOOP'
        ];

        warning.innerText = messages[
            Math.floor(Math.random() * messages.length)
        ];

        setTimeout(() => {
            warning.style.opacity = 0;
        }, 1000);
    }
}

function fakeSystemCorruption() {
    if (hallucinationLevel > 25 && Math.random() > 0.998) {

        document.body.classList.add('flash');

        setTimeout(() => {
            document.body.classList.remove('flash');
        }, 500);
    }
}

function drawExit() {
    const ex = cols - 2;
    const ey = rows - 2;

    ctx.fillStyle = 'red';
    ctx.fillRect(
        ex * tileSize - camera.x + 10,
        ey * tileSize - camera.y + 10,
        tileSize - 20,
        tileSize - 20
    );
}

function checkWin() {
    if (player.x === cols - 2 && player.y === rows - 2) {

        document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:black;
            color:white;
            flex-direction:column;
            font-family:Arial;
            text-align:center;
        ">
            <h1>ESCAPE DETECTED</h1>
            <p>Verifying consciousness integrity...</p>
            <br>
            <p>Result: FAILURE</p>
            <br>
            <small>The maze remembers you.</small>
        </div>
        `;
    }
}

function gameLoop() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateCamera();

    drawMaze();
    drawExit();
    drawPlayer();

    glitchText();
    fakeSystemCorruption();

    mazeShiftTimer++;

    if (mazeShiftTimer > 240) {
        randomMazeShift();
        mazeShiftTimer = 0;
    }

    document.getElementById('memory').innerText =
        `Memory Integrity: ${Math.max(0, memoryIntegrity.toFixed(1))}%`;

    checkWin();

    requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script></body>
  </html>
