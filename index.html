<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze Jumper</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; padding: 10px; }
        h1 { font-size: 20px; margin: 5px 0; }
        #stats { display: flex; gap: 20px; font-size: 14px; margin-bottom: 8px; }
        #maze-container { display: grid; gap: 2px; background: #16213e; padding: 4px; border-radius: 8px; touch-action: none; }
        .cell { width: 20px; height: 20px; border-radius: 2px; }
        .wall { background: #0f3460; }
        .empty { background: #e2e8f0; }
        .ball { background: #e94560; border-radius: 50%; box-shadow: 0 0 8px #e94560; }
        .exit { background: #f5c842; }
        .path { background: #ff6b6b; opacity: 0.6; }
        #controls { display: grid; grid-template-columns: 60px 60px 60px; gap: 6px; margin-top: 12px; touch-action: none; }
        .btn { background: #0f3460; color: white; border: none; padding: 12px; font-size: 20px; border-radius: 10px; cursor: pointer; touch-action: manipulation; }
        .btn:active { background: #e94560; transform: scale(0.95); }
        .btn-jump { background: #533483; grid-column: 1/3; }
        .btn-reset { background: #1a1a2e; border: 1px solid #e94560; grid-column: 3; }
        #win { display: none; color: #f5c842; font-size: 24px; margin-top: 10px; text-align: center; }
        @media (max-width: 400px) { .cell { width: 16px; height: 16px; } #controls { grid-template-columns: 50px 50px 50px; } .btn { padding: 10px; font-size: 16px; } }
    </style>
</head>
<body>
    <h1>🧩 Maze Jumper</h1>
    <div id="stats">
        <span>Moves: <span id="moves">0</span></span>
        <span>Jumps: <span id="jumps">0</span></span>
        <button class="btn" style="padding:4px 12px;font-size:12px;" onclick="resetGame()">New</button>
    </div>
    <div id="maze-container"></div>
    <div id="win">🎉 You escaped! 🎉</div>
    <div id="controls">
        <button class="btn" data-dir="up">⬆</button>
        <button class="btn" data-dir="left">⬅</button>
        <button class="btn" data-dir="down">⬇</button>
        <button class="btn" data-dir="right">➡</button>
        <button class="btn btn-jump" id="jumpBtn">🔁 Jump</button>
        <button class="btn btn-reset" onclick="resetGame()">⟳</button>
    </div>

    <script>
        // --- Maze Generation ---
        const ROWS = 11, COLS = 21;
        let maze = [], player = [0, 1], exit = [ROWS-1, COLS-2];
        let moves = 0, jumps = 0, gameOver = false, path = [];

        function generateMaze() {
            maze = Array(ROWS).fill().map(() => Array(COLS).fill(1));
            function carve(r, c) {
                maze[r][c] = 0;
                let dirs = [[0,2],[0,-2],[2,0],[-2,0]];
                dirs.sort(() => Math.random() - 0.5);
                for (let [dr, dc] of dirs) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && maze[nr][nc] === 1) {
                        maze[r + dr/2][c + dc/2] = 0;
                        carve(nr, nc);
                    }
                }
            }
            carve(1, 1);
            maze[0][1] = 0;
            maze[ROWS-1][COLS-2] = 0;
            player = [0, 1];
            exit = [ROWS-1, COLS-2];
            moves = 0; jumps = 0; gameOver = false; path = [];
        }

        // --- Rendering ---
        function render() {
            const container = document.getElementById('maze-container');
            container.style.gridTemplateColumns = `repeat(${COLS}, 20px)`;
            container.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    if (maze[r][c] === 1) cell.classList.add('wall');
                    else if (r === player[0] && c === player[1]) cell.classList.add('ball');
                    else if (r === exit[0] && c === exit[1]) cell.classList.add('exit');
                    else if (path.some(p => p[0] === r && p[1] === c)) cell.classList.add('path');
                    else cell.classList.add('empty');
                    container.appendChild(cell);
                }
            }
            document.getElementById('moves').textContent = moves;
            document.getElementById('jumps').textContent = jumps;
            document.getElementById('win').style.display = gameOver ? 'block' : 'none';
        }

        // --- Movement ---
        function isValid(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

        function move(dr, dc) {
            if (gameOver) return false;
            let r = player[0], c = player[1];
            let nr = r + dr, nc = c + dc;
            if (isValid(nr, nc) && maze[nr][nc] === 0) {
                player = [nr, nc];
                moves++;
                path.push([nr, nc]);
                if (player[0] === exit[0] && player[1] === exit[1]) gameOver = true;
                render();
                return true;
            }
            return false;
        }

        function jump() {
            if (gameOver) return false;
            let r = player[0], c = player[1];
            for (let [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                let nr = r + dr, nc = c + dc;
                let jr = r + 2*dr, jc = c + 2*dc;
                if (isValid(nr, nc) && maze[nr][nc] === 1 && isValid(jr, jc) && maze[jr][jc] === 0) {
                    player = [jr, jc];
                    moves++;
                    jumps++;
                    path.push([jr, jc]);
                    if (player[0] === exit[0] && player[1] === exit[1]) gameOver = true;
                    render();
                    return true;
                }
            }
            return false;
        }

        function resetGame() {
            generateMaze();
            path = [];
            render();
        }

        // --- Controls ---
        document.querySelectorAll('[data-dir]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                if (dir === 'up') move(-1,0);
                else if (dir === 'down') move(1,0);
                else if (dir === 'left') move(0,-1);
                else if (dir === 'right') move(0,1);
            });
        });

        document.getElementById('jumpBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (!jump()) alert('No wall to jump over!');
        });

        // Keyboard support (for desktop testing)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') move(-1,0);
            else if (e.key === 's' || e.key === 'S') move(1,0);
            else if (e.key === 'a' || e.key === 'A') move(0,-1);
            else if (e.key === 'd' || e.key === 'D') move(0,1);
            else if (e.key === ' ') { e.preventDefault(); if (!jump()) alert('No wall to jump over!'); }
            else if (e.key === 'r' || e.key === 'R') resetGame();
        });

        // --- Start ---
        generateMaze();
        render();
    </script>
</body>
    </html>
